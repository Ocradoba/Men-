<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menü</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
    text-align:center;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:15px 0;
    border-bottom:1px solid #ddd;
}

.price{
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>🍽️ Restaurant Menü</h1>

<div class="item">
<span>Margherita Pizza</span>
<span class="price">320 ₺</span>
</div>

<div class="item">
<span>Cheeseburger</span>
<span class="price">340 ₺</span>
</div>

<div class="item">
<span>Cola</span>
<span class="price">80 ₺</span>
</div>

</div>

</body>
</html>
